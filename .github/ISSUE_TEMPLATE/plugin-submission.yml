name: "Plugin Submission"
description: "Submit a plugin to the RECON Plugin Marketplace"
title: "[Plugin Submission] "
labels: ["plugin-submission"]
body:
  - type: markdown
    attributes:
      value: |
        ## Submit Your Plugin
        Fill out the form below to submit your plugin to the RECON Plugin Marketplace.
        Before submitting, make sure your plugin passes validation: `recon plugins validate your_plugin.py`

  - type: input
    id: plugin-name
    attributes:
      label: Plugin Name
      description: "Unique name for your plugin (lowercase, hyphens only)"
      placeholder: "my-awesome-scanner"
    validations:
      required: true

  - type: input
    id: author
    attributes:
      label: Author
      description: "Your name or GitHub username"
      placeholder: "github-username"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What does your plugin do? Be specific."
      placeholder: "This plugin scans X and returns Y..."
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Username Enumeration
        - Email Investigation
        - Phone Lookup
        - Metadata Extraction
        - Social Media
        - Dark Web
        - Breach Detection
        - Geolocation
        - Network Analysis
        - General
    validations:
      required: true

  - type: checkboxes
    id: input-types
    attributes:
      label: Input Types
      description: "What input types does your plugin accept?"
      options:
        - label: username
        - label: email
        - label: phone

  - type: dropdown
    id: tier
    attributes:
      label: Pricing Tier
      description: "Free plugins are open source. Paid plugins use a 70/30 revenue split (you keep 70%)."
      options:
        - free
        - paid
    validations:
      required: true

  - type: input
    id: price
    attributes:
      label: Price (paid tier only)
      description: "Suggested price in USD (e.g. 10). Leave blank for free plugins."
      placeholder: "10"

  - type: textarea
    id: source-code
    attributes:
      label: Source Code
      description: "Paste your plugin source code here, or attach the .py file below."
      render: python
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission Checklist
      options:
        - label: "My plugin passes `recon plugins validate`"
          required: true
        - label: "My plugin does not contain malicious code"
          required: true
        - label: "I understand the 70/30 revenue split for paid plugins"
          required: true
        - label: "I have tested this plugin locally with RECON v3.0+"
          required: true
