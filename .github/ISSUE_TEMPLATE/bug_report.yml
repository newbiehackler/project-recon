name: 🐛 Bug Report
description: Report a bug in Project RECON
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the details below.

  - type: input
    id: version
    attributes:
      label: RECON Version
      description: Output of `recon --version`
      placeholder: "Project RECON 3.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: macOS Version
      description: Output of `sw_vers -productVersion`
      placeholder: "15.3"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      description: Output of `python3 --version`
      placeholder: "3.12.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands to reproduce the issue.
      placeholder: |
        1. Run `recon johndoe --deep`
        2. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?

  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Paste any error messages or stack traces.
      render: shell
