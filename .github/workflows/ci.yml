name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e .[dev]
      - name: Ruff lint
        run: ruff check whatsmyname/
      - name: Type check
        run: mypy whatsmyname/ --ignore-missing-imports --no-strict-optional

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e .[dev]
      - name: Unit tests
        run: pytest tests/ -v
      - name: Smoke test — version
        run: recon --version
      - name: Smoke test — help
        run: recon --help
      - name: Smoke test — list tools
        run: recon --list-tools
      - name: Smoke test — inventory
        run: recon inventory
      - name: Smoke test — categories
        run: recon categories
      - name: Smoke test — templates
        run: recon templates

  validate-data:
    name: Validate WMN Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate JSON
        run: python -m json.tool wmn-data.json > /dev/null
