name: Validate JSON
on: [pull_request]
jobs:
  verify-json-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install jsonschema
        run: pip install jsonschema
      - name: Validate wmn-data.json against schema
        run: |
          python -c "
          import json, jsonschema, sys
          schema = json.load(open('wmn-data-schema.json'))
          data = json.load(open('wmn-data.json'))
          try:
              jsonschema.validate(data, schema)
              print('✓ wmn-data.json is valid against schema')
          except jsonschema.ValidationError as e:
              print(f'✗ Validation failed: {e.message}', file=sys.stderr)
              sys.exit(1)
          "
